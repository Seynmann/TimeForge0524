<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>TimeForge</title>
  <style>
    :root{
      --bg:#090d18;--bg2:#11182a;--panel:rgba(255,255,255,.068);--panel2:rgba(255,255,255,.105);
      --line:rgba(255,255,255,.095);--text:#f7f8fc;--muted:#9aa6bd;--blue:#79a8ff;--green:#75e0a2;
      --gold:#f4c96d;--red:#ff7a92;--purple:#b69aff;--cyan:#70e5ea;--shadow:0 20px 60px rgba(0,0,0,.34);
      --r:22px;
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent} html,body{height:100%}
    body{margin:0;color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",sans-serif;overflow:hidden;background:radial-gradient(circle at 20% -10%,#253b69 0%,#0f1628 38%,#070a12 100%)}
    button,input,textarea,select{font:inherit;color:inherit} button{border:0;cursor:pointer} input,textarea,select{outline:none}
    .app{height:100%;display:flex;flex-direction:column;gap:8px;padding:10px 10px max(10px,env(safe-area-inset-bottom))}
    .top{display:flex;align-items:center;justify-content:space-between;padding:4px 2px 0}.brand b{font-size:22px;letter-spacing:.2px}.brand span{display:block;font-size:12px;color:var(--muted);margin-top:2px}.pill{display:flex;align-items:center;gap:6px;border:1px solid var(--line);background:rgba(255,255,255,.055);padding:8px 10px;border-radius:999px;color:#eaf0ff;font-weight:800;font-size:12px;box-shadow:var(--shadow)}
    .content{flex:1;min-height:0;overflow:auto;border-radius:28px;scrollbar-width:none}.content::-webkit-scrollbar{display:none}.page{display:none;animation:rise .26s ease both}.page.active{display:block}@keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
    .nav{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;background:rgba(7,10,18,.74);border:1px solid var(--line);border-radius:24px;padding:7px;box-shadow:var(--shadow);backdrop-filter:blur(18px)}.nav button{background:transparent;color:var(--muted);border-radius:17px;padding:8px 2px;font-size:11px;display:flex;flex-direction:column;gap:2px;align-items:center;transition:.18s}.nav button span:first-child{font-size:18px}.nav button.active{background:rgba(255,255,255,.09);color:#fff}.nav button:active,.btn:active{transform:scale(.98)}
    .grid{display:grid;gap:9px}.card{border:1px solid var(--line);border-radius:var(--r);padding:13px;background:linear-gradient(180deg,var(--panel2),var(--panel));box-shadow:var(--shadow);backdrop-filter:blur(18px)}.card h2,.card h3{margin:0 0 10px}.card h2{font-size:18px}.card h3{font-size:15px;color:#e6ecff}.small{font-size:12px}.muted{color:var(--muted)}.row{display:flex;align-items:center;gap:8px}.between{justify-content:space-between}.wrap{flex-wrap:wrap}.two{display:grid;grid-template-columns:1fr 1fr;gap:8px}.three{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.btn{border-radius:15px;padding:10px 12px;background:linear-gradient(180deg,#8ab0ff,#5c7dff);color:white;font-weight:850;box-shadow:0 12px 28px rgba(92,125,255,.28);transition:.18s}.btn.ghost{background:rgba(255,255,255,.065);border:1px solid var(--line);box-shadow:none}.btn.good{background:linear-gradient(180deg,#80e2a7,#35a96d)}.btn.warn{background:linear-gradient(180deg,#f4c96d,#d08b26)}.btn.red{background:linear-gradient(180deg,#ff8398,#dc3e5a)}.btn.dark{background:rgba(0,0,0,.28);border:1px solid var(--line);box-shadow:none}.input{width:100%;background:rgba(0,0,0,.22);border:1px solid var(--line);border-radius:15px;padding:11px 12px;margin-bottom:8px}.input:focus{border-color:rgba(121,168,255,.72)}
    .hero{display:grid;grid-template-columns:154px 1fr;gap:10px}.timeCard{position:relative;min-height:190px;display:flex;align-items:center;justify-content:center;overflow:hidden}.ring{width:136px;height:136px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:conic-gradient(var(--blue) var(--p),rgba(255,255,255,.075) 0);box-shadow:inset 0 0 0 1px var(--line),0 0 38px rgba(121,168,255,.18)}.ringInner{width:108px;height:108px;border-radius:50%;background:#10182b;display:flex;flex-direction:column;align-items:center;justify-content:center;border:1px solid rgba(255,255,255,.08)}.clock{font-size:24px;font-weight:900;font-variant-numeric:tabular-nums}.ringSub{font-size:11px;color:var(--muted);margin-top:3px}.stat{display:grid;gap:8px}.statBox{padding:12px;border-radius:18px;background:rgba(255,255,255,.055);border:1px solid var(--line)}.statBox b{font-size:22px}.progress{height:10px;border-radius:999px;background:rgba(255,255,255,.075);overflow:hidden}.bar{height:100%;width:0;background:linear-gradient(90deg,var(--blue),var(--green));border-radius:inherit;transition:.35s}.timeLineBar{display:grid;grid-template-columns:60px 1fr 44px;gap:8px;align-items:center;margin-top:6px;font-size:12px;color:var(--muted)}
    .task{display:flex;gap:9px;align-items:center;justify-content:space-between;padding:10px;border-radius:17px;background:rgba(255,255,255,.055);border:1px solid var(--line)}.task.done{opacity:.55}.taskMain{min-width:0}.taskTitle{font-weight:850;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.taskMeta{font-size:12px;color:var(--muted);margin-top:3px}.tag{font-size:11px;border:1px solid var(--line);background:rgba(255,255,255,.06);padding:5px 8px;border-radius:999px;white-space:nowrap}.dot{width:10px;height:10px;border-radius:50%;background:var(--blue);box-shadow:0 0 16px var(--blue);flex:0 0 auto}.empty{padding:16px;border-radius:18px;border:1px dashed rgba(255,255,255,.14);text-align:center;color:var(--muted);background:rgba(255,255,255,.035)}
    .seg{display:flex;background:rgba(0,0,0,.24);padding:4px;border-radius:15px;border:1px solid var(--line);gap:4px}.seg button{flex:1;background:transparent;border-radius:12px;padding:8px;color:var(--muted);font-weight:800}.seg button.active{background:rgba(255,255,255,.1);color:white}.week{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}.day{min-height:84px;background:rgba(255,255,255,.045);border:1px solid var(--line);border-radius:16px;padding:7px}.day.today{border-color:rgba(121,168,255,.8);box-shadow:0 0 0 1px rgba(121,168,255,.2) inset}.day b{font-size:13px}.day span{display:block;font-size:10px;color:var(--muted)}.miniTask{margin-top:5px;height:5px;border-radius:999px;background:var(--blue);opacity:.9}.month{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}.mcell{aspect-ratio:1/1;border-radius:11px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.045);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--muted);position:relative}.mcell.has:after{content:"";position:absolute;bottom:5px;width:5px;height:5px;border-radius:50%;background:var(--gold)}.mcell.today{color:#fff;background:rgba(121,168,255,.18);border-color:rgba(121,168,255,.5)}
    .focusLayout{display:grid;gap:9px}.timer{font-size:56px;text-align:center;font-weight:950;letter-spacing:1px;font-variant-numeric:tabular-nums;margin:12px 0;color:#fff;text-shadow:0 0 30px rgba(121,168,255,.24)}.bigTitle{font-size:20px;font-weight:900}.taskPick{max-height:260px;overflow:auto;display:grid;gap:8px;padding-right:2px}.taskPick .task.selected{border-color:rgba(121,168,255,.75);background:rgba(121,168,255,.12)}
    .heatControls{display:flex;gap:7px;flex-wrap:wrap}.heat{display:grid;grid-template-columns:repeat(53,1fr);gap:3px;overflow:auto;padding-bottom:5px}.heat.monthMode{grid-template-columns:repeat(7,1fr)}.sq{width:12px;height:12px;border-radius:3px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.035);flex:0 0 auto}.habitItem{padding:10px;border-radius:17px;border:1px solid var(--line);background:rgba(255,255,255,.052);display:grid;gap:8px}.miniHeat{display:flex;gap:3px;overflow:hidden}.colorDot{width:12px;height:12px;border-radius:50%;border:1px solid rgba(255,255,255,.2);flex:0 0 auto}.countCard{display:flex;gap:10px;align-items:center;justify-content:space-between}.countNum{font-size:26px;font-weight:950;color:var(--gold)}.levelTitle{font-size:27px;font-weight:950}.levelBadge{width:80px;height:80px;border-radius:25px;background:linear-gradient(145deg,#ffdf86,#8d6720);display:flex;align-items:center;justify-content:center;font-size:36px;box-shadow:0 18px 50px rgba(242,199,107,.22)}.log{display:grid;gap:7px;max-height:280px;overflow:auto}.logItem{padding:9px;border-radius:14px;background:rgba(255,255,255,.045);border:1px solid var(--line);display:flex;justify-content:space-between;gap:8px}
    .modal{position:fixed;inset:0;background:rgba(0,0,0,.48);display:none;align-items:flex-end;padding:10px;z-index:9}.modal.show{display:flex}.sheet{width:100%;background:#10182b;border:1px solid var(--line);border-radius:28px;padding:14px;box-shadow:0 -20px 60px rgba(0,0,0,.44);animation:up .2s ease both}@keyframes up{from{transform:translateY(20px);opacity:.45}to{transform:none;opacity:1}}.toast{position:fixed;left:50%;bottom:84px;transform:translateX(-50%);background:rgba(15,22,38,.96);border:1px solid var(--line);border-radius:999px;padding:10px 14px;box-shadow:var(--shadow);display:none;z-index:20;font-size:13px;white-space:nowrap}.toast.show{display:block;animation:rise .18s ease both}
    @media (min-width:700px){.app{max-width:860px;margin:0 auto}.hero{grid-template-columns:250px 1fr}.timeCard{min-height:255px}.ring{width:196px;height:196px}.ringInner{width:154px;height:154px}.clock{font-size:34px}.focusLayout{grid-template-columns:1fr 1.1fr}.timer{font-size:72px}.sq{width:13px;height:13px}.nav button{font-size:12px}}
  </style>
</head>
<body>
<div class="app">
  <div class="top"><div class="brand"><b>TimeForge</b><span id="todayLine">光阴锻造系统</span></div><div class="pill"><span>⭐</span><span id="xpLine">0 分</span></div></div>
  <main class="content">
    <section id="page-home" class="page active"></section>
    <section id="page-calendar" class="page"></section>
    <section id="page-focus" class="page"></section>
    <section id="page-habits" class="page"></section>
    <section id="page-rank" class="page"></section>
  </main>
  <nav class="nav">
    <button data-page="home" class="active"><span>◴</span>今日</button>
    <button data-page="calendar"><span>📅</span>日历</button>
    <button data-page="focus"><span>⏱️</span>专注</button>
    <button data-page="habits"><span>🔥</span>习惯</button>
    <button data-page="rank"><span>🏆</span>成长</button>
  </nav>
</div>
<div id="modal" class="modal"><div class="sheet" id="sheet"></div></div><div id="toast" class="toast"></div>
<script>
const $=s=>document.querySelector(s), $$=s=>Array.from(document.querySelectorAll(s));
const pad=n=>String(n).padStart(2,'0');
const fmtDate=d=>`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
const today=()=>fmtDate(new Date());
const uid=()=>Math.random().toString(36).slice(2,9)+Date.now().toString(36).slice(-5);
const colors=['#79a8ff','#79e0a5','#f2c76b','#ff7a90','#b591ff','#6ee7e7','#ffad66','#d7f171','#8bd3ff'];
let page='home', calendarMode='week', heatMode='year', selectedTaskId=null, timer=null, remain=25*60, total=25*60, running=false;
let data={version:3,xp:0,tasks:[],habits:[],habitLogs:{},countdowns:[],pointLogs:[],checkins:{morning:[],night:[]},settings:{}};
const levels=[
  ['初醒者',0,'🌱'],['守时者 I',120,'🕯️'],['守时者 II',260,'🕯️'],['晨星学徒',450,'✨'],['长夜筑塔者',700,'🗼'],['时间锻造师',1050,'⚒️'],['秩序行者',1500,'🧭'],['专注贤者',2100,'📘'],['星火统领',3000,'🔥'],['光阴王者',4300,'👑'],['非凡王者',6000,'💎'],['无双王者',8200,'🌌'],['绝世王者',10800,'🏔️'],['不朽筑塔者',15000,'☀️']
];
function load(){try{let raw=''; if(window.TimeForgeAndroid) raw=TimeForgeAndroid.loadData(); else raw=localStorage.getItem('timeforge_data')||'{}'; const obj=JSON.parse(raw||'{}'); data={...data,...obj}; data.checkins={morning:[],night:[],...(data.checkins||{})}; if(!data.habitLogs)data.habitLogs={};}catch(e){} seedIfEmpty();}
function seedIfEmpty(){if(!data.habits.length&&!data.tasks.length&&!data.countdowns.length&&!(data.xp>0)){data.habits=[{id:uid(),name:'早起签到',color:colors[0],createdAt:today()},{id:uid(),name:'论文阅读',color:colors[1],createdAt:today()},{id:uid(),name:'运动/拉伸',color:colors[2],createdAt:today()}];const now=new Date();data.tasks=[{id:uid(),title:'整理今日任务',date:today(),time:'09:00',duration:25,done:false,notes:'先把今天最重要的三件事写出来'},{id:uid(),title:'论文阅读 1 篇',date:today(),time:'20:00',duration:45,done:false,notes:''}];data.countdowns=[{id:uid(),title:'阶段性汇报',date:fmtDate(new Date(now.getFullYear(),now.getMonth(),now.getDate()+30))}];save();}}
function save(){const raw=JSON.stringify(data); if(window.TimeForgeAndroid)TimeForgeAndroid.saveData(raw); else localStorage.setItem('timeforge_data',raw); updateTop();}
function updateTop(){const lv=getLevel(); $('#xpLine').textContent=`${data.xp||0} 分 · ${lv[0]}`; const d=new Date(); $('#todayLine').textContent=`${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日 · ${['周日','周一','周二','周三','周四','周五','周六'][d.getDay()]}`;}
function getLevel(){let cur=levels[0];for(const l of levels){if((data.xp||0)>=l[1])cur=l;}return cur;}
function getNextLevel(){for(const l of levels){if(l[1]>(data.xp||0))return l;}return null;}
function addXp(points,title,type='任务'){points=Math.max(0,Math.round(points));if(!points)return;data.xp=(data.xp||0)+points;data.pointLogs.unshift({id:uid(),date:new Date().toLocaleString('zh-CN'),points,title,type});data.pointLogs=data.pointLogs.slice(0,160);maybeLuckyBonus(type);save();}
function maybeLuckyBonus(type){const t=today();const count=data.pointLogs.filter(x=>x.type==='随机奖励'&&String(x.date).includes(t.replaceAll('-','/'))).length;if(count>=5)return;const r=Math.random();let p=0,msg='';if(r<.015){p=50;msg='传说奖励'}else if(r<.06){p=20;msg='史诗奖励'}else if(r<.19){p=8;msg='灵感奖励'}if(p){data.xp=(data.xp||0)+p;data.pointLogs.unshift({id:uid(),date:new Date().toLocaleString('zh-CN'),points:p,title:`${msg} · ${type}`,type:'随机奖励'});toast(`${msg} +${p}`)}}
function esc(s){return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function toast(msg){const t=$('#toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._id);t._id=setTimeout(()=>t.classList.remove('show'),1800);try{if(window.TimeForgeAndroid)TimeForgeAndroid.toast(msg)}catch(e){}}
function openSheet(html){$('#sheet').innerHTML=html;$('#modal').classList.add('show')}function closeModal(){$('#modal').classList.remove('show')}$('#modal').onclick=e=>{if(e.target.id==='modal')closeModal()};
$$('.nav button').forEach(b=>b.onclick=()=>{page=b.dataset.page;$$('.nav button').forEach(x=>x.classList.toggle('active',x===b));render();});
function render(){updateTop();$$('.page').forEach(p=>p.classList.remove('active'));$(`#page-${page}`).classList.add('active'); if(page==='home')renderHome(); if(page==='calendar')renderCalendar(); if(page==='focus')renderFocus(); if(page==='habits')renderHabits(); if(page==='rank')renderRank();}
function todayTasks(){return data.tasks.filter(t=>t.date===today()).sort((a,b)=>(a.time||'99:99').localeCompare(b.time||'99:99'));}
function taskHtml(t,actions=true){return `<div class="task ${t.done?'done':''}" onclick="selectTask('${t.id}')"><div class="dot"></div><div class="taskMain"><div class="taskTitle">${esc(t.title)}</div><div class="taskMeta">${t.date} ${t.time||'全天'} · ${t.duration||25}分钟${t.notes?' · '+esc(t.notes):''}</div></div>${actions?`<div class="row"><button class="btn ghost" onclick="event.stopPropagation();quickStart('${t.id}')">开始</button><button class="btn ${t.done?'ghost':'good'}" onclick="event.stopPropagation();finishTask('${t.id}')">${t.done?'已完成':'完成'}</button></div>`:''}</div>`}
function renderHome(){const tasks=todayTasks();const done=tasks.filter(t=>t.done).length;const dayPct=dayProgress();const lv=getLevel();const cds=data.countdowns.slice().sort((a,b)=>a.date.localeCompare(b.date));$('#page-home').innerHTML=`
  <div class="grid">
    <div class="hero">
      <div class="card timeCard"><div class="ring" style="--p:${dayPct*3.6}deg"><div class="ringInner"><div class="clock" id="clockNow">--:--</div><div class="ringSub">今日已过 ${dayPct.toFixed(1)}%</div></div></div></div>
      <div class="stat">
        <div class="statBox"><div class="small muted">当前段位</div><b>${lv[2]} ${lv[0]}</b></div>
        <div class="statBox"><div class="row between"><span class="small muted">今日完成</span><b>${done}/${tasks.length}</b></div><div class="progress"><div class="bar" style="width:${tasks.length?done/tasks.length*100:0}%"></div></div></div>
        <div class="two"><button class="btn warn" onclick="checkin('morning')">晨间签到</button><button class="btn ghost" onclick="checkin('night')">睡前签到</button></div>
      </div>
    </div>
    <div class="card"><h3>今日时间感</h3>${timeBars()}</div>
    <div class="card"><div class="row between"><h2>今日任务</h2><button class="btn" onclick="openTaskModal()">添加</button></div><div class="grid">${tasks.length?tasks.map(t=>taskHtml(t)).join(''):'<div class="empty">今天还没有任务。点右上角添加一个。</div>'}</div></div>
    <div class="card"><div class="row between"><h2>重要日子</h2><button class="btn ghost" onclick="openCountdownModal()">添加</button></div><div class="grid">${cds.length?cds.map(countdownHtml).join(''):'<div class="empty">可以添加开题、考试、汇报、旅行等重要日子。</div>'}</div></div>
  </div>`;tickClock();}
function dayProgress(){const n=new Date();return ((n.getHours()*3600+n.getMinutes()*60+n.getSeconds())/86400)*100;}
function tickClock(){const el=$('#clockNow');if(!el)return;const n=new Date();el.textContent=`${pad(n.getHours())}:${pad(n.getMinutes())}`;}
setInterval(()=>{if(page==='home'){const ring=$('.ring');if(ring){const p=dayProgress();ring.style.setProperty('--p',p*3.6+'deg');const sub=ring.querySelector('.ringSub');if(sub)sub.textContent=`今日已过 ${p.toFixed(1)}%`;tickClock();}}},1000);
function timeBars(){const n=new Date();const hour=n.getHours()+n.getMinutes()/60;const blocks=[['清晨',5,9,'早起窗口'],['白天',9,18,'主线推进'],['夜晚',18,23.667,'睡前窗口']];return blocks.map(b=>{const pct=Math.max(0,Math.min(100,(hour-b[1])/(b[2]-b[1])*100));return `<div class="timeLineBar"><span>${b[0]}</span><div class="progress"><div class="bar" style="width:${pct}%"></div></div><span>${b[3]}</span></div>`}).join('')}
function countdownHtml(c){const diff=Math.ceil((new Date(c.date+'T00:00:00')-new Date())/86400000);return `<div class="task countCard"><div><div class="taskTitle">${esc(c.title)}</div><div class="taskMeta">${c.date}</div></div><div class="countNum">${diff>=0?diff:'已过'}${diff>=0?'<span class="small">天</span>':''}</div></div>`}
function renderCalendar(){const all=data.tasks.slice().sort((a,b)=>(a.date+a.time).localeCompare(b.date+b.time));$('#page-calendar').innerHTML=`<div class="grid"><div class="card"><div class="row between"><h2>日历</h2><button class="btn" onclick="openTaskModal()">新建日程</button></div><div class="seg"><button class="${calendarMode==='week'?'active':''}" onclick="calendarMode='week';renderCalendar()">周视图</button><button class="${calendarMode==='month'?'active':''}" onclick="calendarMode='month';renderCalendar()">月视图</button></div></div><div class="card">${calendarMode==='week'?weekHtml():monthHtml()}</div><div class="card"><h2>全部日程</h2><div class="grid">${all.length?all.map(t=>taskHtml(t)).join(''):'<div class="empty">暂无日程。</div>'}</div></div></div>`}
function startOfWeek(d=new Date()){const x=new Date(d);const day=(x.getDay()+6)%7;x.setDate(x.getDate()-day);x.setHours(0,0,0,0);return x;}
function weekHtml(){const s=startOfWeek();let html='<div class="week">';for(let i=0;i<7;i++){const d=new Date(s);d.setDate(s.getDate()+i);const ds=fmtDate(d);const ts=data.tasks.filter(t=>t.date===ds);html+=`<div class="day ${ds===today()?'today':''}"><b>${['一','二','三','四','五','六','日'][i]}</b><span>${d.getMonth()+1}/${d.getDate()}</span>${ts.slice(0,5).map((t,j)=>`<div class="miniTask" style="background:${colors[j%colors.length]}"></div>`).join('')}</div>`}return html+'</div>'}
function monthHtml(){const n=new Date();const first=new Date(n.getFullYear(),n.getMonth(),1);const start=(first.getDay()+6)%7;const days=new Date(n.getFullYear(),n.getMonth()+1,0).getDate();let html=`<div class="row between"><b>${n.getFullYear()} 年 ${n.getMonth()+1} 月</b><span class="muted small">圆点表示有日程</span></div><div class="month" style="margin-top:10px">`;for(let i=0;i<start;i++)html+='<div></div>';for(let d=1;d<=days;d++){const ds=fmtDate(new Date(n.getFullYear(),n.getMonth(),d));const has=data.tasks.some(t=>t.date===ds);html+=`<div class="mcell ${has?'has':''} ${ds===today()?'today':''}">${d}</div>`}return html+'</div>'}
function renderFocus(){const pending=data.tasks.filter(t=>!t.done).sort((a,b)=>(a.date+a.time).localeCompare(b.date+b.time));if(!selectedTaskId&&pending[0])selectedTaskId=pending[0].id;const st=data.tasks.find(t=>t.id===selectedTaskId);$('#page-focus').innerHTML=`<div class="focusLayout"><div class="card"><div class="row between"><h2>任务列表</h2><button class="btn ghost" onclick="openTaskModal()">添加</button></div><div class="taskPick">${pending.length?pending.map(t=>`<div class="task ${t.id===selectedTaskId?'selected':''}" onclick="selectTask('${t.id}')"><div class="dot"></div><div class="taskMain"><div class="taskTitle">${esc(t.title)}</div><div class="taskMeta">${t.date} ${t.time||''} · ${t.duration||25}分钟</div></div></div>`).join(''):'<div class="empty">没有待完成任务。</div>'}</div></div><div class="card"><div class="small muted">当前绑定任务</div><div class="bigTitle">${st?esc(st.title):'未选择任务'}</div><div class="timer" id="timerText">${timerText()}</div><div class="progress"><div class="bar" style="width:${total?Math.max(0,Math.min(100,(1-remain/total)*100)):0}%"></div></div><div class="three" style="margin-top:12px"><button class="btn good" onclick="startTimer()">${running?'继续':'开始'}</button><button class="btn ghost" onclick="pauseTimer()">暂停</button><button class="btn warn" onclick="completeFocus()">完成</button></div><div class="two" style="margin-top:8px"><button class="btn dark" onclick="setTimerMinutes(25)">25分钟</button><button class="btn dark" onclick="setTimerMinutes(45)">45分钟</button></div></div></div>`}
function timerText(){const m=Math.floor(remain/60),s=remain%60;return `${pad(m)}:${pad(s)}`}
function updateTimer(){const el=$('#timerText');if(el)el.textContent=timerText();const bar=$('.focusLayout .bar');if(bar)bar.style.width=(total?Math.max(0,Math.min(100,(1-remain/total)*100)):0)+'%';}
function setTimerMinutes(m){pauseTimer();total=remain=m*60;updateTimer();}
function startTimer(){if(running)return;running=true;timer=setInterval(()=>{remain--;if(remain<=0){pauseTimer();remain=0;toast('专注完成，可以结算啦');}updateTimer();},1000)}
function pauseTimer(){running=false;if(timer){clearInterval(timer);timer=null}}
function selectTask(id){selectedTaskId=id;const t=data.tasks.find(x=>x.id===id);if(t){total=remain=(t.duration||25)*60;}if(page==='focus')renderFocus();else{page='focus';$$('.nav button').forEach(b=>b.classList.toggle('active',b.dataset.page==='focus'));render();}}
function quickStart(id){selectTask(id);startTimer();}
function completeFocus(){if(selectedTaskId)finishTask(selectedTaskId);pauseTimer();}
function finishTask(id){const t=data.tasks.find(x=>x.id===id);if(!t||t.done)return;t.done=true;addXp(Math.max(10,Math.round((t.duration||25)*.8)),`完成任务：${t.title}`,'任务完成');save();toast('任务完成，积分到账');render();}
function renderHabits(){const habits=data.habits;$('#page-habits').innerHTML=`<div class="grid"><div class="card"><div class="row between"><h2>习惯</h2><button class="btn" onclick="openHabitModal()">添加</button></div><div class="heatControls"><button class="btn ${heatMode==='month'?'warn':'ghost'}" onclick="heatMode='month';renderHabits()">最近一月</button><button class="btn ${heatMode==='year'?'warn':'ghost'}" onclick="heatMode='year';renderHabits()">最近一年</button><button class="btn ghost" onclick="shareHeatmap()">导出图片</button></div></div><div class="card"><h3>全部习惯热力图</h3>${heatmapAll()}</div><div class="grid">${habits.length?habits.map(habitHtml).join(''):'<div class="card empty">还没有习惯。</div>'}</div></div>`}
function datesBack(days){const arr=[];for(let i=days-1;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);arr.push(fmtDate(d));}return arr;}
function heatmapAll(){const days=heatMode==='month'?31:365;const dates=datesBack(days);return `<div class="heat ${heatMode==='month'?'monthMode':''}">${dates.map(ds=>{let hits=[];data.habits.forEach(h=>{if((data.habitLogs[h.id]||[]).includes(ds))hits.push(h.color)});let bg=hits.length===0?'rgba(255,255,255,.06)':hits.length===1?hits[0]:`linear-gradient(135deg,${hits.slice(0,4).join(',')})`;return `<div class="sq" title="${ds}" style="background:${bg};opacity:${hits.length?Math.min(1,.45+hits.length*.2):1}"></div>`}).join('')}</div><div class="row wrap" style="margin-top:10px">${data.habits.map(h=>`<span class="tag"><i class="colorDot" style="display:inline-block;background:${h.color}"></i> ${esc(h.name)}</span>`).join('')}</div>`}
function habitHtml(h){const logs=data.habitLogs[h.id]||[];const done=logs.includes(today());const streak=getStreak(h.id);return `<div class="card habitItem"><div class="row between"><div class="row"><span class="colorDot" style="background:${h.color}"></span><div><div class="taskTitle">${esc(h.name)}</div><div class="taskMeta">累计 ${logs.length} 次 · 连续 ${streak} 天</div></div></div><button class="btn ${done?'ghost':'good'}" onclick="toggleHabit('${h.id}')">${done?'今日已打':'打卡'}</button></div><div class="miniHeat">${datesBack(31).map(ds=>`<div class="sq" style="background:${logs.includes(ds)?h.color:'rgba(255,255,255,.06)'}"></div>`).join('')}</div></div>`}
function toggleHabit(id){const arr=data.habitLogs[id]||[];const ds=today();const h=data.habits.find(x=>x.id===id);if(arr.includes(ds)){data.habitLogs[id]=arr.filter(x=>x!==ds);toast('已取消今日打卡')}else{arr.push(ds);data.habitLogs[id]=arr;addXp(12,`习惯打卡：${h?h.name:''}`,'习惯打卡');toast('打卡成功')}save();render();}
function getStreak(id){const arr=new Set(data.habitLogs[id]||[]);let c=0;const d=new Date();while(arr.has(fmtDate(d))){c++;d.setDate(d.getDate()-1)}return c;}
function renderRank(){const lv=getLevel(), next=getNextLevel();const xp=data.xp||0;const pct=next?Math.max(0,Math.min(100,(xp-lv[1])/(next[1]-lv[1])*100)):100;$('#page-rank').innerHTML=`<div class="grid"><div class="card"><div class="row between"><div><div class="small muted">当前成长段位</div><div class="levelTitle">${lv[0]}</div><div class="muted small">${next?`距离 ${next[0]} 还差 ${next[1]-xp} 分`:'你已经到达当前最高段位'}</div></div><div class="levelBadge">${lv[2]}</div></div><div class="progress" style="margin-top:14px"><div class="bar" style="width:${pct}%"></div></div></div><div class="card"><h2>签到奖励</h2><div class="two"><button class="btn warn" onclick="checkin('morning')">晨间签到</button><button class="btn ghost" onclick="checkin('night')">睡前签到</button></div><p class="muted small">早上越早奖励越多，9 点后无早起奖励；睡前越早奖励越多，23:40 后无睡前奖励。</p></div><div class="card"><h2>数据安全</h2><div class="two"><button class="btn ghost" onclick="exportJson()">导出备份</button><button class="btn ghost" onclick="importJsonPrompt()">导入备份</button></div><p class="muted small">覆盖安装不会丢数据；卸载、清除数据会丢。重要数据请定期导出备份。</p></div><div class="card"><h2>段位体系</h2><div class="grid">${levels.map(l=>`<div class="logItem"><span>${l[2]} ${l[0]}</span><b>${l[1]}分</b></div>`).join('')}</div></div><div class="card"><h2>积分流水</h2><div class="log">${data.pointLogs.length?data.pointLogs.map(x=>`<div class="logItem"><div><b>${esc(x.title)}</b><div class="muted small">${esc(x.date)} · ${esc(x.type)}</div></div><b>+${x.points}</b></div>`).join(''):'<div class="empty">暂无积分记录。</div>'}</div></div></div>`}
function openTaskModal(){openSheet(`<h2>新建日程/任务</h2><input id="tTitle" class="input" placeholder="任务名称，例如：论文阅读"><div class="two"><input id="tDate" class="input" type="date" value="${today()}"><input id="tTime" class="input" type="time" value="09:00"></div><div class="two"><input id="tDur" class="input" type="number" min="5" value="25" placeholder="分钟"><select id="tRemind" class="input"><option value="10">提前10分钟提醒</option><option value="0">开始时提醒</option><option value="30">提前30分钟提醒</option><option value="-1">不提醒</option></select></div><textarea id="tNotes" class="input" placeholder="备注，可不填"></textarea><div class="two"><button class="btn ghost" onclick="closeModal()">取消</button><button class="btn" onclick="addTask()">保存</button></div>`)}
function addTask(){const title=$('#tTitle').value.trim();if(!title)return toast('先写任务名称');const t={id:uid(),title,date:$('#tDate').value,time:$('#tTime').value,duration:parseInt($('#tDur').value)||25,notes:$('#tNotes').value.trim(),done:false};data.tasks.push(t);const rem=parseInt($('#tRemind').value);if(rem>=0)scheduleTaskReminder(t,rem);save();closeModal();toast('已保存日程');render();}
function scheduleTaskReminder(t,mins){if(!t.date||!t.time)return;const start=new Date(`${t.date}T${t.time}:00`).getTime();const trigger=start-mins*60000;if(window.TimeForgeAndroid&&trigger>Date.now())TimeForgeAndroid.scheduleReminder('TimeForge 提醒',`你的「${t.title}」将在${mins?mins+'分钟后':'现在'}开始～`,trigger);}
function openHabitModal(){openSheet(`<h2>添加习惯</h2><input id="hName" class="input" placeholder="例如：早起 / 论文 / 运动"><div class="two"><button class="btn ghost" onclick="closeModal()">取消</button><button class="btn" onclick="addHabit()">保存</button></div>`)}
function addHabit(){const name=$('#hName').value.trim();if(!name)return toast('先写习惯名称');data.habits.push({id:uid(),name,color:colors[data.habits.length%colors.length],createdAt:today()});save();closeModal();render();}
function openCountdownModal(){openSheet(`<h2>添加重要日子</h2><input id="cTitle" class="input" placeholder="例如：论文开题"><input id="cDate" class="input" type="date" value="${today()}"><div class="two"><button class="btn ghost" onclick="closeModal()">取消</button><button class="btn" onclick="addCountdown()">保存</button></div>`)}
function addCountdown(){const title=$('#cTitle').value.trim();if(!title)return toast('先写名称');const c={id:uid(),title,date:$('#cDate').value};data.countdowns.push(c);scheduleCountdown(c);save();closeModal();toast('重要日子已保存');render();}
function scheduleCountdown(c){if(!window.TimeForgeAndroid)return;const due=new Date(`${c.date}T08:30:00`).getTime();if(due>Date.now())TimeForgeAndroid.scheduleReminder('重要日子提醒',`今天是「${c.title}」`,due);const pre=due-86400000;if(pre>Date.now())TimeForgeAndroid.scheduleReminder('重要日子提醒',`距离「${c.title}」还有 1 天`,pre);}
function checkin(type){const ds=today();if((data.checkins[type]||[]).includes(ds))return toast('今天已经签到了');const n=new Date();const h=n.getHours()+n.getMinutes()/60;let p=0;if(type==='morning'){if(h<6)p=40;else if(h<7)p=30;else if(h<8)p=20;else if(h<9)p=10;}else{if(h<22.5)p=35;else if(h<23)p=25;else if(h<23.667)p=10;}data.checkins[type].push(ds);if(p)addXp(p,type==='morning'?'晨间签到':'睡前签到',type==='morning'?'早起奖励':'睡前奖励');save();toast(p?`签到成功 +${p}`:'签到成功，本时间段无额外奖励');render();}
function exportJson(){const raw=JSON.stringify(data,null,2);try{if(window.TimeForgeAndroid){TimeForgeAndroid.shareTextFile('timeforge-backup.json',raw);toast('已生成备份分享文件');return}}catch(e){}const blob=new Blob([raw],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='timeforge-backup.json';a.click();}
function importJsonPrompt(){openSheet(`<h2>导入数据</h2><textarea id="jsonIn" class="input" style="height:190px" placeholder="把备份 JSON 内容粘贴到这里"></textarea><div class="two"><button class="btn ghost" onclick="closeModal()">取消</button><button class="btn" onclick="doImport()">导入</button></div>`)}
function doImport(){try{const obj=JSON.parse($('#jsonIn').value);data={...data,...obj};save();closeModal();render();toast('导入成功')}catch(e){toast('JSON 格式不对')}}
function shareHeatmap(){const c=document.createElement('canvas'),w=1200,h=760;c.width=w;c.height=h;const ctx=c.getContext('2d');ctx.fillStyle='#0b1020';ctx.fillRect(0,0,w,h);ctx.fillStyle='#fff';ctx.font='bold 48px sans-serif';ctx.fillText('我的习惯热力图',70,90);ctx.fillStyle='#93a0b8';ctx.font='24px sans-serif';ctx.fillText('滴水穿石，不是一天的事',70,132);let x=70,y=185,size=18,gap=6,cols=53;const dates=datesBack(365);dates.forEach((ds,i)=>{let hits=[];data.habits.forEach(h=>{if((data.habitLogs[h.id]||[]).includes(ds))hits.push(h.color)});ctx.fillStyle=hits.length?hits[0]:'rgba(255,255,255,.08)';ctx.globalAlpha=hits.length?Math.min(1,.45+hits.length*.2):1;ctx.fillRect(x+(i%cols)*(size+gap),y+Math.floor(i/cols)*(size+gap),size,size);});ctx.globalAlpha=1;ctx.fillStyle='#fff';ctx.font='28px sans-serif';ctx.fillText(`总积分：${data.xp||0}   习惯数：${data.habits.length}`,70,610);ctx.fillStyle='#93a0b8';ctx.font='22px sans-serif';ctx.fillText('TimeForge · 光阴锻造系统',70,650);const url=c.toDataURL('image/png');try{if(window.TimeForgeAndroid)TimeForgeAndroid.shareImage(url);else{const a=document.createElement('a');a.href=url;a.download='timeforge_heatmap.png';a.click()}}catch(e){toast('导出失败')}}
load();render();
</script>
</body>
</html>
